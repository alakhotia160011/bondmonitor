name: Refresh Bond Monitor Data

on:
  schedule:
    # Every weekday at 7:00 AM ET (12:00 UTC during EDT, 12:00 UTC during EST)
    - cron: "0 12 * * 1-5"
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic python-dotenv langchain-community beautifulsoup4

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        working-directory: News Update/news-scraper
        run: python scraper.py

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "News Update/news-scraper/public/data.json"
          git diff --cached --quiet || git commit -m "chore: refresh bond monitor data [$(date -u '+%Y-%m-%d')]"
          git push
